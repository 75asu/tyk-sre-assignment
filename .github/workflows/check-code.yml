name: Check Code

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: golang/go.mod
          cache-dependency-path: golang/go.sum

      # One step per gate via its Makefile target, so a failure pinpoints the gate.
      - name: Format
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test
        run: make test
