name: Check Chart

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CHART: helm/tyk-sre-assignment

jobs:
  check-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint
        run: helm lint ${{ env.CHART }}

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kc.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          sudo tar -xzf /tmp/kc.tar.gz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests
        run: helm template tyk-sre-assignment ${{ env.CHART }} | kubeconform -strict -summary
