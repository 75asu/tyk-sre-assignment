apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tyk-sre-assignment.fullname" . }}
  labels:
    {{- include "tyk-sre-assignment.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tyk-sre-assignment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tyk-sre-assignment.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tyk-sre-assignment.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "tyk-sre-assignment.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # In-cluster config (no --kubeconfig) uses the ServiceAccount token.
          args: ["--address=:{{ .Values.service.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
