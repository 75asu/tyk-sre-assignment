{{- if .Values.rbac.create -}}
# Cluster-scoped because the tool reads Deployments and manages NetworkPolicies across all namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tyk-sre-assignment.fullname" . }}
  labels:
    {{- include "tyk-sre-assignment.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tyk-sre-assignment.fullname" . }}
  labels:
    {{- include "tyk-sre-assignment.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tyk-sre-assignment.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "tyk-sre-assignment.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
