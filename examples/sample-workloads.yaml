# Example workloads for exercising the deployment-health check (GET /deployments/unhealthy).
#   web-healthy   , real image, 2 replicas -> becomes Ready       (healthy, not reported)
#   web-degraded  , bad image, 3 replicas  -> ImagePullBackOff     (0 ready, reported unhealthy)
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-healthy
  namespace: demo
  labels:
    app.kubernetes.io/name: web-healthy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-healthy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-healthy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-degraded
  namespace: demo
  labels:
    app.kubernetes.io/name: web-degraded
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: web-degraded
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-degraded
    spec:
      containers:
        - name: nginx
          image: nginx:this-tag-does-not-exist # ImagePullBackOff => never Ready
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
