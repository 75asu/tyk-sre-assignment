# Healthy Deployment: real image, becomes Ready -> the tool should NOT flag it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-healthy
  namespace: demo
  labels:
    app.kubernetes.io/name: web-healthy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-healthy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-healthy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
